<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ShareCar 관리자</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="admin-layout">

    <!-- ==========================
        Sidebar
    =========================== -->

    <aside class="sidebar">

        <div class="logo">

            <h2>ShareCar</h2>

            <span>Admin CMS</span>

        </div>

        <nav>

            <button class="menu active">

                🚗 차량관리

            </button>

            <button class="menu">

                📊 대시보드

            </button>

            <button class="menu">

                ⚙ 설정

            </button>

        </nav>

        <div class="bottom">

            <button id="logoutBtn">

                로그아웃

            </button>

        </div>

    </aside>

    <!-- ==========================
        Main
    =========================== -->

    <main class="content">

        <header class="page-header">

            <div>

                <h1>차량 관리</h1>

                <p>차량을 등록하고 수정할 수 있습니다.</p>

            </div>

            <button id="addCarBtn">

                + 차량 등록

            </button>

        </header>

        <!-- 통계 -->

        <section class="summary">

            <div class="summary-card">

                <span>전체 차량</span>

                <strong id="totalCount">0</strong>

            </div>

            <div class="summary-card">

                <span>판매중</span>

                <strong id="saleCount">0</strong>

            </div>

            <div class="summary-card">

                <span>예약중</span>

                <strong id="reserveCount">0</strong>

            </div>

            <div class="summary-card">

                <span>판매완료</span>

                <strong id="soldCount">0</strong>

            </div>

        </section>

        <!-- 검색 -->

        <section class="toolbar">

            <input
                id="searchInput"
                type="text"
                placeholder="차량명 검색">

        </section>

        <!-- 차량 테이블 -->

        <section class="table-wrap">

            <table>

                <thead>

                    <tr>

                        <th>사진</th>

                        <th>모델</th>

                        <th>차종</th>

                        <th>연식</th>

                        <th>색상</th>

                        <th>주행거리</th>

                        <th>가격</th>

                        <th>상태</th>

                        <th>관리</th>

                    </tr>

                </thead>

                <tbody id="carTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<!-- ==========================
등록 슬라이드 패널
========================== -->

<div class="drawer" id="carDrawer">

    <div class="drawer-header">

        <h2>차량 등록</h2>

        <button id="closeDrawer">

            ✕

        </button>

    </div>

    <form id="carForm">

        <label>

            모델명

            <input
                type="text"
                id="model"
                required>

        </label>

        <label>

            차종

            <input
                type="text"
                id="type"
                required>

        </label>

        <label>

            연식

            <input
                type="text"
                id="year">

        </label>

        <label>

            색상

            <input
                type="text"
                id="color">

        </label>

        <label>

            연료

            <input
                type="text"
                id="fuel">

        </label>

        <label>

            주행거리

            <input
                type="text"
                id="mileage">

        </label>

        <label>

            가격

            <input
                type="text"
                id="price">

        </label>

        <label>

            상태

            <select id="status">

                <option>판매중</option>

                <option>예약중</option>

                <option>판매완료</option>

            </select>

        </label>

        <label>

이미지 URL

<input
type="text"
id="imageurl">

</label>

    <img id="preview1">

</div>

        <button type="submit">

            차량 등록

        </button>

    </form>

</div>

</body>
</html>
