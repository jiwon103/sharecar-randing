<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShareCar Admin</title>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="css/admin.css">
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>ShareCar</h1>
        <p>관리자 로그인</p>

        <form id="loginForm">

            <input
                type="text"
                id="userid"
                placeholder="아이디"
                autocomplete="off"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="비밀번호"
                required
            >

            <button type="submit">
                로그인
            </button>

        </form>

        <div id="loginMessage"></div>

    </div>

</div>

<script src="../js/auth.js"></script>

</body>
</html>
